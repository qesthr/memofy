<head>
  <!-- First script — no flash -->
  <script>
    const theme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  </script>

  <style>
    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background-color: var(--fallback-b1, #ffffff);
      transition: opacity 0.3s ease;
    }

    #app-loader.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(0,0,0,0.1);
      border-top-color: oklch(var(--p, 65% 0.25 270));
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- Loader lives outside Vue — shows instantly on every load/reload -->
  <div id="app-loader">
    <div class="loader-spinner"></div>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
